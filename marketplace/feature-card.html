<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClaudeMon - Feature Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 965px;
  height: 482px;
  overflow: hidden;
  margin: 0;
  background: #0a0a0a;
  font-family: 'Geist Mono', monospace;
  color: #e8e0d4;
  position: relative;
}

/* Noise texture */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  pointer-events: none;
  z-index: 1;
}

/* Green radial glow */
.glow {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse at center, rgba(163, 177, 138, 0.08) 0%, transparent 70%);
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
}

.logo-area {
  margin-top: 80px;
  text-align: center;
}

.logo {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.shield-icon {
  color: #a3b18a;
}

.tagline {
  margin-top: 12px;
  font-size: 14px;
  color: #8a8478;
  letter-spacing: 1px;
}

/* Terminal mockup */
.terminal {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  background: #141210;
  border: 1px solid #3d3a34;
  border-radius: 6px 6px 0 0;
  opacity: 0.6;
  mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 100%);
}

.terminal-bar {
  height: 28px;
  background: #1a1916;
  border-bottom: 1px solid #3d3a34;
  border-radius: 6px 6px 0 0;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
}

.terminal-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #3d3a34;
}

.terminal-title {
  font-size: 10px;
  color: #6b6560;
  margin-left: 8px;
}

.terminal-body {
  padding: 12px 16px;
}

.session-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  font-size: 11px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.session-id {
  font-weight: 700;
  color: #e8e0d4;
  width: 70px;
}

.session-status {
  font-size: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 1px 6px;
  border-radius: 2px;
}

.session-info {
  color: #6b6560;
  font-size: 9px;
}

.session-tool {
  color: #8a8478;
  font-size: 9px;
  margin-left: auto;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="content">
  <div class="logo-area">
    <div class="logo">
      <svg class="shield-icon" width="40" height="40" viewBox="0 0 256 256" fill="currentColor">
        <path d="M208,40H48A16,16,0,0,0,32,56v58.77c0,89.62,75.82,119.34,91,124.39a15.53,15.53,0,0,0,10,0c15.2-5.05,91-34.77,91-124.39V56A16,16,0,0,0,208,40Zm-30.46,90.81-56,56a8,8,0,0,1-11.32,0l-24-24a8,8,0,0,1,11.32-11.32L116,170.06l50.34-50.34a8,8,0,0,1,11.32,11.32Z"/>
      </svg>
      ClaudeMon
    </div>
    <div class="tagline">Monitor your Claude Code sessions in real time</div>
  </div>

  <div class="terminal">
    <div class="terminal-bar">
      <div class="terminal-dot"></div>
      <div class="terminal-dot"></div>
      <div class="terminal-dot"></div>
      <span class="terminal-title">AGENT MAP</span>
    </div>
    <div class="terminal-body">
      <div class="session-row">
        <div class="status-dot" style="background: #a3b18a; box-shadow: 0 0 6px #a3b18a;"></div>
        <span class="session-id">a3f2b8c1</span>
        <span class="session-status" style="color: #a3b18a; background: rgba(163,177,138,0.12);">Working</span>
        <span class="session-info">4 edits &middot; 8 cmds &middot; 12 reads</span>
        <span class="session-tool">Edit src/index.ts</span>
      </div>
      <div class="session-row">
        <div class="status-dot" style="background: #7b9fbf; box-shadow: 0 0 6px #7b9fbf;"></div>
        <span class="session-id">7d9e4f2a</span>
        <span class="session-status" style="color: #7b9fbf; background: rgba(123,159,191,0.12);">Thinking</span>
        <span class="session-info">2 edits &middot; 3 cmds</span>
        <span class="session-tool">Read App.tsx</span>
      </div>
      <div class="session-row">
        <div class="status-dot" style="background: #c9a96e; box-shadow: 0 0 6px #c9a96e;"></div>
        <span class="session-id">b1c3d5e7</span>
        <span class="session-status" style="color: #c9a96e; background: rgba(201,169,110,0.12);">Waiting</span>
        <span class="session-info">Claude needs your input</span>
        <span class="session-tool"></span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
