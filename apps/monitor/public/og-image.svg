<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Character (centered, scaled up) -->
  <g transform="translate(472,40) scale(1.0)">
    <!-- Body -->
    <path d="M128,44 C204,44 228,76 228,120 C228,168 204,196 128,196 C52,196 28,168 28,120 C28,76 52,44 128,44 Z" fill="#D77757"/>
    <!-- Left arm -->
    <ellipse cx="18" cy="130" rx="14" ry="26" fill="#D77757"/>
    <!-- Right arm -->
    <ellipse cx="238" cy="130" rx="14" ry="26" fill="#D77757"/>
    <!-- Left eye -->
    <rect x="80" y="88" width="26" height="40" rx="7" fill="#000"/>
    <!-- Right eye -->
    <rect x="150" y="88" width="26" height="40" rx="7" fill="#000"/>
    <!-- Left leg -->
    <rect x="72" y="188" width="36" height="28" rx="10" fill="#D77757"/>
    <!-- Right leg -->
    <rect x="148" y="188" width="36" height="28" rx="10" fill="#D77757"/>
  </g>

  <!-- Subtle pulse rings behind character -->
  <circle cx="600" cy="172" r="160" fill="none" stroke="#D77757" stroke-width="1.5" opacity="0.1"/>
  <circle cx="600" cy="172" r="200" fill="none" stroke="#D77757" stroke-width="1" opacity="0.06"/>

  <!-- ClaudeMon title -->
  <text x="600" y="360" text-anchor="middle" font-family="'Geist Mono', 'SF Mono', 'Fira Code', monospace" font-size="56" font-weight="700" fill="#D77757">ClaudeMon</text>

  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="'Geist Mono', 'SF Mono', 'Fira Code', monospace" font-size="20" fill="#666666">Monitor your Claude Code sessions in real time</text>

  <!-- Subtle bottom accent line -->
  <rect x="440" y="450" width="320" height="1" fill="#D77757" opacity="0.2"/>
</svg>
